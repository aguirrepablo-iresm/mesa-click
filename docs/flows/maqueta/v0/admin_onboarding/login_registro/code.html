                    "error": "#ba1a1a",
                    "surface-bright": "#fcf9f5",
                    "primary-fixed-dim": "#ffb599",
                    "tertiary-fixed-dim": "#b1c5ff",

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAE8D8; /* Using JSON specified soft orange/white surface */
        }
        .floating-label-group {
            position: relative;
        }
        .floating-label-group input:focus ~ label,
        .floating-label-group input:not(:placeholder-shown) ~ label {
            top: 0.5rem;
            font-size: 0.75rem;
            color: #a23900;
        }
        .floating-label-group label {
            position: absolute;
            top: 1.25rem;
            left: 1rem;
            transition: all 0.2s ease-out;
            pointer-events: none;
            color: #594138;
        }
        .floating-label-group input {
            padding-top: 1.75rem;
            padding-bottom: 0.75rem;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface items-center justify-center p-gutter">
<!-- Brand Logo Section -->
<div class="mb-xl text-center">
<h1 class="text-display-lg font-display-lg text-primary tracking-tighter">
            Mesa CLICK
        </h1>
<p class="text-body-md font-body-md text-on-surface-variant mt-sm">
            Administración gastronómica profesional
        </p>
</div>
<!-- Main Auth Card -->
<main class="w-full max-w-md bg-white rounded-xl shadow-lg p-xl space-y-lg relative overflow-hidden">
<!-- Accent Line -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<div class="space-y-sm">
<h2 class="text-headline-md font-headline-md text-on-surface">Bienvenido</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Inicia sesión para gestionar tus pedidos.</p>
</div>
<form class="space-y-md">
<!-- Email Input with Floating Label -->
<div class="floating-label-group">
<input class="w-full border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg bg-surface-bright text-body-md font-body-md px-4 outline-none transition-all" id="email" placeholder=" " type="email"/>
<label class="text-label-lg font-label-lg" for="email">Email</label>
</div>
<!-- Password Input with Floating Label -->
<div class="floating-label-group">
<input class="w-full border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg bg-surface-bright text-body-md font-body-md px-4 outline-none transition-all" id="password" placeholder=" " type="password"/>
<label class="text-label-lg font-label-lg" for="password">Password</label>
</div>
<div class="flex items-center justify-end">
<a class="text-label-sm font-label-sm text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Main Actions -->
<div class="space-y-sm pt-sm">
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-label-lg text-label-lg hover:bg-primary-container active:scale-95 transition-all shadow-sm" type="submit">
                    Iniciar Sesión
                </button>
<button class="w-full border border-primary text-primary py-4 rounded-lg font-label-lg text-label-lg hover:bg-primary/5 active:scale-95 transition-all" type="button">
                    Crear cuenta
                </button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center py-md">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-md text-label-sm font-label-sm text-on-surface-variant">O continúa con</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Magic Link Alternative -->
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-low border border-outline-variant text-on-surface-variant py-md rounded-lg font-label-lg text-label-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="auto_fix">auto_fix</span>
            Magic Link
        </button>
<p class="text-center text-label-sm font-label-sm text-on-surface-variant px-xl">
            Al continuar, aceptas nuestros términos de servicio y política de privacidad.
        </p>
</main>
<!-- Visual Element / Hero Illustration -->
<div class="mt-xl w-full max-w-md hidden md:block">
<div class="rounded-xl overflow-hidden shadow-md">
<img alt="Restaurant atmosphere" class="w-full h-32 object-cover" data-alt="A professional, clean high-angle shot of a modern restaurant kitchen during service preparation. The scene is bathed in warm, soft natural light reflecting off stainless steel surfaces and white ceramic plates. The color palette emphasizes soft oranges and warm whites, creating a professional yet inviting atmosphere consistent with the Mesa CLICK brand identity. The focus is sharp and clinical, suggesting organization and efficiency." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCj8cZ_uownIGxc-Y5J8JLHxfQFXjhler1mt2xcNwoxWUTOembl_0vSdmOhB2GxoZBATYjrajp3Tc5EtaNuPLB9DwDf-31nysD8e5uiGOTyWq7Lk_W3fAk8gUYokZnlnHLKV3-ubOzZJ_OdQYkqkPRZb6MWiE29ze9L1rD8H8dpJslaWBvSDJt8iVLU8zBX53CQkP_2kECkBaT0MblAFJeZf1qeGxOf_75efY9kcpvvhuVfaIPn42HuV5WLdxiQJhkXr7bduRCrlIjv"/>
</div>
</div>
<!-- Footer Identity -->
<footer class="mt-auto py-xl text-center">
<div class="flex items-center justify-center gap-xs opacity-50">
<span class="material-symbols-outlined text-[16px]" data-icon="restaurant">restaurant</span>
<span class="text-label-sm font-label-sm">Mesa CLICK v2.4.0</span>
</div>
</footer>
</body></html>
