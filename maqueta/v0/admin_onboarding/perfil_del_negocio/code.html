<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

      tailwind.config = {

          extend: {
            "colors": {
                    "background": "#fcf9f5",
                    "error-container": "#ffdad6",
                    "surface-tint": "#a63b00",

                    "inverse-on-surface": "#f3f0ec",

                    "on-error-container": "#93000a",

                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-background": "#1c1c1a",
                    "on-tertiary-fixed-variant": "#00419e",
                    "on-primary-fixed": "#370e00",
                    "error": "#ba1a1a",
                    "surface-bright": "#fcf9f5",
                    "primary-fixed-dim": "#ffb599",
                    "tertiary-fixed-dim": "#b1c5ff",
                    "tertiary-fixed": "#dae2ff",
                    "on-secondary-fixed": "#22005d",
                    "surface-dim": "#dcdad6",
                    "on-secondary-container": "#eee4ff",
                    "on-surface-variant": "#594138",
                    "tertiary-container": "#036cfb",
                    "on-surface": "#1c1c1a",
                    "surface-container-highest": "#e5e2de",
                    "primary-fixed": "#ffdbce",
                    "on-primary-container": "#fffbff",
                    "outline-variant": "#e1bfb3",
                    "primary-container": "#cb4a04",
                    "on-secondary": "#ffffff",
                    "secondary": "#5e00e4",
                    "secondary-container": "#7736ff",
                    "secondary-fixed-dim": "#cfbdff",
                    "surface": "#fcf9f5",
                    "surface-container-low": "#f6f3ef",
                    "on-secondary-fixed-variant": "#5400cc",
                    "tertiary": "#0055c9",
                    "on-tertiary-fixed": "#001946",
                    "primary": "#a23900",
                    "on-tertiary-container": "#fefcff",
                    "on-primary-fixed-variant": "#7f2b00",
                    "inverse-primary": "#ffb599",
                    "on-primary": "#ffffff",
                    "surface-variant": "#e5e2de"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "xl": "32px",
                    "xs": "4px",
                    "sm": "8px",
                    "gutter": "16px",
                    "margin-mobile": "16px",
                    "md": "16px",
                    "base": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "label-lg": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "display-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.25", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
                    "label-lg": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],

          },
        },
      }

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcf9f5; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(33, 37, 41, 0.05); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#FAE8D8] dark:bg-slate-950 border-b border-[#212529]/10 shadow-sm">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#E25B1A] dark:text-[#E25B1A] hover:bg-[#E25B1A]/10 p-2 rounded-full active:scale-95 transition-transform" data-icon="arrow_back">arrow_back</button>
<span class="font-['Plus_Jakarta_SANS'] font-bold text-lg text-[#E25B1A] dark:text-[#E25B1A]">Mesa CLICK</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-[#E25B1A]">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a restaurant administrator in a clean, modern setting. The person has a friendly but focused expression, representing professional reliability. The lighting is soft and warm, aligning with the brand's sophisticated and organized heat aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMrdYfWJHio48aUTkAUbNxD-P1YX1Rwd3awZVFAaFDw75rnr8FJGq7dtP78__6hAi1hu0njlpPaBP3iFOPeARgMG-htwh7CysuOiM3mwvN7b6EkdVB_I839ZXmvt71gKklC3H6l--PSQrm4hvdavcvi_bkVi2dpxyjBGMpCNfL6eWuHcDu7jI_W64OcBfdcr4eLH7QJc4YzggnNCvsTdFnuX_3BEJtZljvlzUZ69hxQcbp4216b5Fuy4MLyayL0KQsSntGRcVz8B6O"/>
</div>
</header>
<main class="flex-1 mt-16 pb-24 px-gutter max-w-2xl mx-auto w-full">
<!-- Progress Indicator -->
<section class="py-xl">
<div class="flex justify-between items-end mb-sm">
<div>
<p class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Paso 2 de 4</p>
<h1 class="font-headline-md text-headline-md mt-xs">Perfil del Negocio</h1>
</div>
<span class="font-label-lg text-label-lg text-primary">25%</span>
</div>
<div class="w-full bg-surface-container h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/4 rounded-full transition-all duration-500"></div>
</div>
</section>
<!-- Main Form -->
<form class="space-y-lg">
<!-- Bento Card: Primary Info -->
<div class="glass-card p-lg rounded-xl shadow-sm space-y-md">
<div class="flex items-center gap-sm text-primary mb-md">
<span class="material-symbols-outlined" data-icon="store">store</span>
<h2 class="font-label-lg text-label-lg">Información General</h2>
</div>
<div class="grid grid-cols-1 gap-md">
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs group-focus-within:text-primary transition-colors">Nombre del Dueño</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/50" placeholder="Ej: Juan Pérez" type="text"/>
</div>
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs group-focus-within:text-primary transition-colors">Nombre de Fantasía del Negocio</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/50" placeholder="Ej: Café de la Esquina" type="text"/>
</div>
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs group-focus-within:text-primary transition-colors">Rubro</label>
<div class="relative">
<select class="w-full h-12 pl-md pr-10 bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none appearance-none transition-all">
<option disabled="" selected="" value="">Selecciona un rubro</option>
<option>Cafetería</option>
<option>Restaurante</option>
<option>Comida Rápida</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Bento Card: Bio -->
<div class="glass-card p-lg rounded-xl shadow-sm">
<div class="flex items-center gap-sm text-primary mb-md">
<span class="material-symbols-outlined" data-icon="description">description</span>
<h2 class="font-label-lg text-label-lg">Biografía/Descripción</h2>
</div>
<div class="group">
<textarea class="w-full p-md bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/50 resize-none" placeholder="Cuéntanos un poco sobre la esencia de tu negocio..." rows="4"></textarea>
<p class="mt-xs text-[10px] text-outline text-right">0 / 250 caracteres</p>
</div>
</div>
<!-- Bento Card: Optional Details -->
<div class="glass-card p-lg rounded-xl shadow-sm space-y-md">
<div class="flex items-center justify-between mb-sm">
<div class="flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<h2 class="font-label-lg text-label-lg">Datos Opcionales</h2>
</div>
<span class="bg-surface-container px-sm py-xs rounded text-[10px] font-bold uppercase text-outline">Recomendado</span>
</div>
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">CUIT/CUIL</label>
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/50" placeholder="XX-XXXXXXXX-X" type="text"/>
</div>
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant">Redes Sociales</label>
<div class="flex gap-sm">
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm" data-icon="share">share</span>
<input class="w-full h-10 pl-9 pr-md bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-sm" placeholder="Instagram" type="text"/>
</div>
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm" data-icon="language">language</span>
<input class="w-full h-10 pl-9 pr-md bg-white border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all text-sm" placeholder="Website" type="text"/>
</div>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="pt-md pb-lg">
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-sm" type="submit">
                    Guardar y Continuar
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-md text-label-sm text-outline">Puedes editar estos datos más tarde desde la configuración.</p>
</div>
</form>
</main>
<!-- BottomNavBar (Suppressed for focused onboarding flow as per UX mandate) -->
<!-- Exclusion Rule applied: Linear/Transactional flow detected -->
<!-- Floating Background Decor -->
<div class="fixed top-0 right-0 -z-10 opacity-10 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="200" cy="200" fill="#E25B1A" r="200"></circle>
</svg>
</div>
<div class="fixed -bottom-20 -left-20 -z-10 opacity-5 pointer-events-none">
<svg fill="none" height="300" viewbox="0 0 300 300" width="300" xmlns="http://www.w3.org/2000/svg">
<rect fill="#E25B1A" height="300" rx="40" width="300"></rect>
</svg>
</div>
</body></html>
